<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Buffalo Injury Law Firm — Knowledge Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#F6F3EC;
    --parchment-deep:#EFEADE;
    --panel:#FFFFFF;
    --line:#E2DCCC;
    --ink:#211E1A;
    --ink-soft:#5B564C;
    --brass:#8C6A2F;
    --brass-deep:#6E5323;
    --brick:#8C3B32;
    --brick-soft:#F3E4E1;
    --forest:#4C6650;
    --forest-soft:#E7EEE6;
    --slate:#4A5568;
    --slate-soft:#E9EBEF;
    --gold-soft:#F1E7D2;
    --radius:3px;
    --shadow: 0 1px 2px rgba(33,30,26,0.06), 0 6px 20px -8px rgba(33,30,26,0.12);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--parchment);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--gold-soft);}

  a{color:inherit;}

  /* ---- Header ---- */
  .masthead{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, var(--parchment) 0%, var(--parchment-deep) 100%);
    padding:38px 40px 26px;
  }
  .masthead-inner{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0;}
  .brand-eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--brass-deep);margin:0 0 10px;font-weight:500;
  }
  .brand-title{
    font-family:'Lora',serif;font-weight:700;font-size:clamp(28px,4vw,42px);line-height:1.05;margin:0;
    letter-spacing:-0.01em;
  }
  .brand-sub{font-family:'Lora',serif;font-style:italic;color:var(--ink-soft);font-size:16px;margin:8px 0 0;}

  /* ---- Search bar ---- */
  .search-zone{max-width:1180px;margin:0 auto;padding:22px 40px 0;}
  .search-box{
    position:relative;display:flex;align-items:center;background:var(--panel);
    border:1.5px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:0 16px;height:52px;
  }
  .search-box:focus-within{border-color:var(--brass);}
  .search-box svg{flex:none;color:var(--ink-soft);}
  .search-box input{
    border:none;outline:none;background:transparent;width:100%;height:100%;
    font-family:'Inter',sans-serif;font-size:15px;padding:0 12px;color:var(--ink);
  }
  .search-box input::placeholder{color:#A39C8C;}
  .search-count{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-soft);
    white-space:nowrap;padding-left:8px;border-left:1px solid var(--line);
  }

  /* ---- Layout ---- */
  .layout{max-width:1180px;margin:0 auto;padding:28px 40px 80px;display:grid;grid-template-columns:230px 1fr;gap:36px;}
  @media (max-width:860px){.layout{grid-template-columns:1fr;padding:22px 18px 60px;} .masthead{padding:30px 18px 22px;} .search-zone{padding:20px 18px 0;}}

  /* ---- Docket rail (phase nav / signature element) ---- */
  .rail{position:sticky;top:20px;align-self:start;}
  .rail-label{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 14px 2px;}
  .rail-track{position:relative;padding-left:20px;}
  .rail-track::before{
    content:"";position:absolute;left:5px;top:6px;bottom:6px;width:1.5px;
    background:linear-gradient(var(--line),var(--line));
  }
  .rail-item{
    position:relative;display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    padding:9px 0 9px 4px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--ink-soft);
    font-weight:500;transition:color .15s ease;
  }
  .rail-item::before{
    content:"";position:absolute;left:-19px;top:50%;transform:translateY(-50%);
    width:9px;height:9px;border-radius:50%;background:var(--parchment-deep);border:1.5px solid var(--line);
    transition:all .15s ease;
  }
  .rail-item .count{font-family:'JetBrains Mono',monospace;font-size:11px;color:#A39C8C;margin-left:6px;}
  .rail-item:hover{color:var(--ink);}
  .rail-item.active{color:var(--ink);font-weight:600;}
  .rail-item.active::before{background:var(--brass);border-color:var(--brass);box-shadow:0 0 0 3px var(--gold-soft);}
  .rail-item.active .count{color:var(--brass-deep);}

  .rail-foot{margin-top:22px;padding-top:16px;border-top:1px solid var(--line);}
  .rail-foot a{
    display:block;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-soft);
    text-decoration:none;padding:5px 0 5px 4px;
  }
  .rail-foot a:hover{color:var(--brass-deep);}

  /* ---- Main content ---- */
  .phase-section{margin-bottom:38px;}
  .phase-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line);}
  .phase-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--brass-deep);}
  .phase-title{font-family:'Lora',serif;font-weight:600;font-size:20px;margin:0;}
  .phase-desc{font-size:12.5px;color:var(--ink-soft);margin-left:auto;text-align:right;max-width:320px;}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 16px 14px;box-shadow:var(--shadow);text-decoration:none;color:var(--ink);
    display:flex;flex-direction:column;gap:8px;transition:transform .12s ease, border-color .12s ease;
    font-family:inherit;text-align:left;cursor:pointer;width:100%;
  }
  .card:hover{border-color:var(--brass);transform:translateY(-1px);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .card-title{font-family:'Lora',serif;font-weight:600;font-size:15.5px;line-height:1.3;}
  .card-arrow{flex:none;color:#C6BFAC;margin-top:2px;}
  .card:hover .card-arrow{color:var(--brass);}
  .card-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.5;flex:1;}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
  .tag{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.03em;text-transform:uppercase;
    padding:3px 7px;border-radius:2px;font-weight:500;
  }
  .tag.Intake{background:var(--slate-soft);color:var(--slate);}
  .tag.Case-set-up{background:#EEE3D2;color:#7A5A28;}
  .tag.Pre-suit{background:#FBF0D8;color:#8A6A17;}
  .tag.Litigation{background:var(--brick-soft);color:var(--brick);}
  .tag.Settlement{background:var(--forest-soft);color:var(--forest);}
  .tag.Trial-Preparation{background:#F3E1E1;color:#8C3B32;}
  .tag.Miscellaneous{background:#EDEAE3;color:#75705F;}
  .tag.Reference{background:#E7E9F2;color:#4A5090;}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--ink-soft);font-size:14px;
    border:1px dashed var(--line);border-radius:var(--radius);background:var(--panel);
  }
  .empty-state strong{display:block;font-family:'Lora',serif;font-size:17px;color:var(--ink);margin-bottom:6px;font-weight:600;}

  mark{background:var(--gold-soft);color:inherit;border-radius:2px;padding:0 1px;}

  .hidden{display:none !important;}

  /* ---- Detail modal ---- */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(33,30,26,0.45);z-index:100;
    display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;
  }
  .modal-panel{
    background:var(--panel);max-width:760px;width:100%;border-radius:var(--radius);
    box-shadow:0 20px 60px -12px rgba(33,30,26,0.4);margin-bottom:40px;
  }
  .modal-head{
    padding:26px 32px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);
    display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-radius:var(--radius) var(--radius) 0 0;
  }
  .modal-title{font-family:'Lora',serif;font-weight:700;font-size:22px;margin:0 0 8px;}
  .modal-close{
    flex:none;background:var(--parchment-deep);border:1px solid var(--line);border-radius:50%;
    width:32px;height:32px;cursor:pointer;color:var(--ink-soft);font-size:16px;line-height:1;
  }
  .modal-close:hover{color:var(--ink);border-color:var(--brass);}
  .modal-body{padding:24px 32px 32px;font-size:14.5px;line-height:1.7;color:#3A362F;}
  .modal-body h3, .modal-body h4, .modal-body h5{font-family:'Lora',serif;color:var(--ink);margin:22px 0 8px;}
  .modal-body h3:first-child, .modal-body h4:first-child{margin-top:0;}
  .modal-body p{margin:0 0 12px;}
  .modal-body ul, .modal-body ol{margin:0 0 14px;padding-left:22px;}
  .modal-body li{margin-bottom:5px;}
  .modal-body strong{color:var(--ink);}
  .modal-body blockquote{
    margin:14px 0;padding:10px 16px;background:var(--gold-soft);border-left:3px solid var(--brass);
    border-radius:0 3px 3px 0;font-style:italic;
  }
  .doc-table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;}
  .doc-table td, .doc-table th{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top;}
  .doc-table th{background:var(--parchment-deep);font-family:'Inter',sans-serif;font-weight:600;}
  body.modal-open{overflow:hidden;}
</style>
</head>
<body>

  <header class="masthead">
    <div class="masthead-inner">
      <h1 class="brand-title">The Buffalo Injury Law Firm</h1>
      <p class="brand-sub">Knowledge Hub — how we work a file, start to finish</p>
    </div>
  </header>

  <div class="search-zone">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" placeholder="Search procedures — e.g. “HIPAA release,” “bill of particulars,” “no-fault”…" autocomplete="off">
      <span class="search-count" id="resultCount">65 items</span>
    </div>
  </div>

  <div class="layout">
    <nav class="rail">
      <p class="rail-label">Case Posture</p>
      <div class="rail-track" id="railTrack"></div>
    </nav>

    <main id="mainContent"></main>
  </div>

  <div id="modalRoot"></div>

<script>
// ---- Data pulled from the firm's "Case Tasks" Notion database ----
let PHASES = [];
let ITEMS = [];

let PHASE_META = {};

function init(){
  PHASE_META = Object.fromEntries(PHASES.map(p=>[p.key,p]));
function slug(k){return k.replace(/[^a-zA-Z]/g,"-");}

// Build rail
const railTrack = document.getElementById("railTrack");
railTrack.innerHTML = `<button class="rail-item active" data-phase="__all">All procedures <span class="count">${ITEMS.length}</span></button>` +
  PHASES.map(ph=>{
    const n = ITEMS.filter(i=>i.p.includes(ph.key)).length;
    if(n===0) return "";
    return `<button class="rail-item" data-phase="${ph.key}">${ph.label} <span class="count">${n}</span></button>`;
  }).join("");

let activePhase = "__all";
let query = "";

function highlight(text, q){
  if(!q || !text) return text || "";
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx === -1) return text;
  return text.slice(0,idx) + "<mark>" + text.slice(idx, idx+q.length) + "</mark>" + text.slice(idx+q.length);
}

function render(){
  const main = document.getElementById("mainContent");
  const q = query.trim().toLowerCase();

  let filtered = ITEMS.filter(item=>{
    const phaseMatch = activePhase === "__all" || item.p.includes(activePhase);
    if(!phaseMatch) return false;
    if(!q) return true;
    return item.t.toLowerCase().includes(q) || (item.d && item.d.toLowerCase().includes(q)) || item.p.some(p=>p.toLowerCase().includes(q));
  });

  document.getElementById("resultCount").textContent = filtered.length + (filtered.length===1 ? " item" : " items");

  if(filtered.length === 0){
    main.innerHTML = `<div class="empty-state"><strong>No matching procedures</strong>Try a different term, or clear the search to browse by case posture.</div>`;
    return;
  }

  const phasesToRender = activePhase === "__all" ? PHASES : PHASES.filter(p=>p.key===activePhase);
  let html = "";
  phasesToRender.forEach((ph, idx)=>{
    const items = filtered.filter(i=>i.p.includes(ph.key));
    if(items.length===0) return;
    html += `<section class="phase-section">
      <div class="phase-head">
        <span class="phase-num">${String(idx+1).padStart(2,"0")}</span>
        <h2 class="phase-title">${ph.label}</h2>
        <span class="phase-desc">${ph.desc}</span>
      </div>
      <div class="card-grid">
        ${items.map(item=>`
          <button class="card" type="button" data-title="${item.t.replace(/"/g,'&quot;')}">
            <div class="card-top">
              <span class="card-title">${highlight(item.t, q)}</span>
              <svg class="card-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            ${item.d ? `<div class="card-desc">${highlight(item.d, q)}</div>` : `<div class="card-desc" style="color:#B7AF9D;font-style:italic;">Click to read the full procedure</div>`}
            <div class="card-tags">
              ${item.p.map(tag=>`<span class="tag ${slug(tag)}">${tag}</span>`).join("")}
            </div>
          </button>
        `).join("")}
      </div>
    </section>`;
  });
  main.innerHTML = html;
}

document.getElementById("searchInput").addEventListener("input", (e)=>{
  query = e.target.value;
  render();
});

railTrack.addEventListener("click", (e)=>{
  const btn = e.target.closest(".rail-item");
  if(!btn) return;
  activePhase = btn.dataset.phase;
  document.querySelectorAll(".rail-item").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
});

document.getElementById("mainContent").addEventListener("click", (e)=>{
  const card = e.target.closest(".card");
  if(!card) return;
  const item = ITEMS.find(i => i.t === card.dataset.title);
  if(item) openModal(item);
});

function openModal(item){
  const root = document.getElementById("modalRoot");
  root.innerHTML = `
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal-panel">
        <div class="modal-head">
          <div>
            <h2 class="modal-title">${item.t}</h2>
            <div class="card-tags">${item.p.map(tag=>`<span class="tag ${slug(tag)}">${tag}</span>`).join("")}</div>
          </div>
          <button class="modal-close" id="modalCloseBtn" type="button" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">${item.content || "<p><em>No content on file for this procedure.</em></p>"}</div>
      </div>
    </div>
  `;
  document.body.classList.add("modal-open");
  document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("modalBackdrop").addEventListener("click", (e)=>{
    if(e.target.id === "modalBackdrop") closeModal();
  });
  document.addEventListener("keydown", escCloseHandler);
}

function escCloseHandler(e){
  if(e.key === "Escape") closeModal();
}

function closeModal(){
  document.getElementById("modalRoot").innerHTML = "";
  document.body.classList.remove("modal-open");
  document.removeEventListener("keydown", escCloseHandler);
}

  render();
}

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    const archivedKeys = data.phases.filter(p => p.archived).map(p => p.key);
    PHASES = data.phases.filter(p => !p.archived);
    ITEMS = data.items
      .map(item => ({...item, p: item.p.filter(k => !archivedKeys.includes(k))}))
      .filter(item => item.p.length > 0);
    init();
  })
  .catch(err => {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><strong>Could not load wiki data</strong>data.json failed to load: ' + err + '</div>';
  });
</script>
</body>
</html>
